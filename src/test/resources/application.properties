# ===== Logging =====
logging.level.root=info
logging.level.com.betacom=debug
logging.file.name=./jpa-test.log
logging.pattern.console=%d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n

# ===== H2 in-memory =====
spring.datasource.url=jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== JPA / Hibernate =====
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# ===== SQL Init =====
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.open-in-view=false
