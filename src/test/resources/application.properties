spring.application.name=projectJPA

# ===== Logging (ok) =====
logging.level.root=info
logging.level.com.betacom=debug
logging.file.name=log./jpa-test.log
logging.pattern.console=%d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n

# ===== H2 in-memory =====
spring.datasource.url=jdbc:h2:mem:db_jpa;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=davide
spring.datasource.password=pwMySQL

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql