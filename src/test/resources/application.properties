spring.application.name=projectJPA

# ===== Logging (ok) =====
logging.level.root=info
logging.level.com.betacom=debug
logging.file.name=log./jpa-test.log
logging.pattern.console=%d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n

# ===== H2 in-memory =====
spring.datasource.url=jdbc:h2:mem:ecommerce_backend;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# JWT
# jwt.secret=${jwt.secret}
jwt.secret=VGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktMTIzNDU2
app.upload.dir:uploads

# mock mail
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
mail.password=test
# mail.sender=test@test.com
#spring.mail.password=testpassword

mail.validation=http://localhost:4200/emailValidation/


# Force SQL init
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql